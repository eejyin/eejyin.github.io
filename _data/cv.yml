      - bullet: 'J. Yin, B. She, J. Wang, et al., "**Encoding Frequency Dynamics into Economic Operation of IBR-Penetrated Power Systems: Quantification, Integration, and Validation**," *IEEE Transactions on Smart Grid*, 2025. (Under review)'
