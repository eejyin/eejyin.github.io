        position: Graduate Research Assistant
        location: Knoxville, TN, USA
        url: https://curent.utk.edu/
        start_date: 2023-08
        highlights:
          - Developed and maintained real-time simulation models for bulk-power-system validation as a developer of the CURENT Large-scale Testbed (LTB).
          - Implemented contingency and dynamic disturbance scenarios for operational reliability studies.
          - Supported hardware-in-the-loop (HIL) demonstrations of inverter-based resources and frequency-stability performance.

      - company: University of Tennessee, Knoxville
        position: Graduate Teaching Assistant
        location: Knoxville, TN, USA
        start_date: 2023-08
        end_date: 2025-08
        highlights:
          - "Courses supported: Power System Analysis, Electric Energy System Components, Circuits II."

      - company: Microsoft
        position: Research Intern — AI/ML for Electricity-Infrastructure Planning
        location: Redmond, WA, USA
        url: https://www.microsoft.com/
        start_date: 2026-06
        end_date: 2026-08
        highlights:
          - Developed the Power-Grid Dataset Restoration Agent that uses limited grid information to "build–diagnose–repair–verify–visualize" datasets for hyperscalers' critical-infrastructure planning.
          - Built a game-theory-based simulation environment for hyperscaler data-center planning, integrating a public-information retrieval agent to design competitive siting and capacity strategies.
          - Designed a data-center interconnection-queue agent that optimizes hyperscalers' interconnection applications while accounting for ISO interconnection processes and grid-upgrade costs.

      - company: Frontiers Journals, Higher Education Press (HEP)
        position: Publicist
        location: China
        start_date: 2022-05
        end_date: 2022-08
        highlights:
          - Promoted the "Frontiers Journals" English academic series through posters, online forums, and meetings with scholars.

      - company: Yangzhou Electric Power Co., Ltd (State Grid)
        position: Graduate R&amp;D Intern
        location: Yangzhou, China
        start_date: 2021-07
        end_date: 2022-01
        highlights:
          - Analyzed load-overcapacity issues for commercial and industrial customers using peak-demand patterns and contractual limits.
          - Conducted cost-benefit analysis of mitigation strategies (capacity upgrades, penalty payments, shared energy storage).
          - Developed an optimization-based scheduling strategy for shared energy storage to reduce peak demand and operating costs.

      - company: Huizhou Electric Power Co., Ltd (China Southern Power Grid)
        position: Intern
        location: Huizhou, China
        start_date: 2019-07
        end_date: 2019-08
        highlights:
          - Observed real-time dispatch-center operations and substation workflows.
          - Completed electrical-safety and field-safety training aligned with utility operational standards.

    Projects:
      - name: LLM-Enabled Power System Simulation and Planning Platform
        summary: "U.S. DOE Project · Feb. 2025 – Present"
        highlights:
          - Developed an LLM-assisted workflow for power-system simulation, enabling natural-language interaction for grid-data input, parameter configuration, and automated result interpretation.
          - Implemented AI-supported workflows for PV-curve visualization and continuation power flow (CPF) analysis to assess voltage stability and planning-relevant operating margins.
          - Built Python-based DNN/CNN prototypes for surrogate modeling, including load-curve fitting and power-flow prediction on benchmark systems.

      - name: Grid Resilience Operation &amp; Scheduling
        summary: "U.S. DOE Project · Jul. 2024 – Oct. 2025"
        highlights:
          - Developed N–k contingency-simulation tools based on a deep variational autoencoder (VAE) to assess system performance under contingency and extreme-event scenarios.
          - Integrated steady-state and dynamic simulations to evaluate system resilience and stability margins.
          - Performed probabilistic contingency assessments to support resilience planning and improve computational efficiency in large-scale grid studies.

      - name: Microgrid Control &amp; Resilience (ESTCP)
        summary: "U.S. DoD Project · Jul. 2020 – Apr. 2024"
        highlights:
          - Designed reinforcement-learning (RL)-based V–f and P–Q control strategies for grid-forming (GFM) and grid-following (GFL) converters to enhance stability and resilience under varying grid conditions.
          - Validated on the Large-Scale Testbed (LTB) and Hardware Testbed (HTB) at CURENT.

