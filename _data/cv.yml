cv:
  name: Junjie (John) Yin
  label: PhD Candidate in Electrical Engineering — AI/ML for Power Systems
  email: jyin10@vols.utk.edu
  location: Knoxville, TN, USA
  image: prof_pic.jpg
  summary: >-
    PhD candidate in Electrical Engineering specializing in AI/ML for power systems, with hands-on
    experience in power flow, state estimation, grid modeling, data-center planning, and
    inverter-based-resource (IBR) frequency dynamics. Skilled in physics-informed and deep-learning
    models — including CNN/DNN surrogates for power-flow prediction and topology-aware N–k
    contingency analysis. A core developer of the CURENT Large-Scale Testbed (LTB), advancing its
    AI/LLM-driven simulation; proficient in Python (LangChain, PyTorch, TensorFlow) and power-system
    tools (OpenDSS, PSS/E, PSCAD, Pandapower, MATPOWER), with strong technical writing and
    presentation skills.

